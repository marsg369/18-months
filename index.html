<div class="overlay"></div>

<audio id="music" loop>
<source src="music/romantic.mp3">
</audio>

<div class="controls">
<button id="startBtn" onclick="startEverything()">
❤️ Start
</button>

<div id="playbackControls" style="display: none;">
<button class="playback-btn" onclick="togglePauseResume(true)">⏸️ Pause</button>
<button class="playback-btn" onclick="togglePauseResume(false)">▶️ Resume</button>
</div>
</div>

<div class="container">
<h1>To pet name here ❤️</h1>

<div class="card">
<div id="letter"></div>
</div>

<div class="card timer-card">
<div class="totals-list">
every day <span id="totalDays" class="num-val">0</span><br>
every hour <span id="totalHours" class="num-val">0</span><br>
every minute <span id="totalMinutes" class="num-val">0</span><br>
every second <span id="totalSeconds" class="num-val">0</span>
</div>
<div class="live-ticker">
Forever and Always ❤️ <span id="counter" class="num-val">00 : 00 : 00 : 00</span>
</div>
</div>
</div>

<script>
const message = `
eveerythitngi I wann typed will come here and flowweewew nicely and readibly blah blah blha not for yalls eyes so i edited the code ♥️🌹♾️.
`;

let i = 0;
let started = false;
let isPaused = false;
let typingTimeout = null;

function startEverything() {
if (started) return; 
started = true;

document.getElementById("startBtn").style.display = "none";
document.getElementById("playbackControls").style.display = "block";

document.getElementById("music").play();
type();

// Spawning foreground hearts
for(let i=0; i<50; i++){
let heart = document.createElement("div");
heart.className = "heart";
heart.innerHTML = "❤️";
heart.style.left = Math.random()*100+"vw";
heart.style.fontSize = "20px";
heart.style.animationDuration = (5+Math.random()*5)+"s";
document.body.appendChild(heart);
}
}

function type(){
if (isPaused) return; // Halt script if paused

if(i < message.length){
document.getElementById("letter").innerHTML += message.charAt(i);
i++;
typingTimeout = setTimeout(type, 75);
}
}

// Master synced media control function
function togglePauseResume(shouldPause) {
const music = document.getElementById("music");
isPaused = shouldPause;

if (shouldPause) {
music.pause();
clearTimeout(typingTimeout); // Freezes text workflow loops instantly
} else {
music.play();
type(); // Restarts text typing track cleanly
}
}

// Live calculation engine anchored to Jan 5, 2025
const startDate = new Date("January 5, 2025 00:00:00").getTime();

function updateTimer() {
const now = new Date().getTime();
const difference = now - startDate;

const absoluteSeconds = Math.floor(difference / 1000);
const absoluteMinutes = Math.floor(difference / (1000 * 60));
const absoluteHours = Math.floor(difference / (1000 * 60 * 60));
const absoluteDays = Math.floor(difference / (1000 * 60 * 60 * 24));

const days = absoluteDays;
const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
const seconds = Math.floor((difference % (1000 * 60)) / 1000);

const dStr = days.toString().padStart(2, '0');
const hStr = hours.toString().padStart(2, '0');
const mStr = minutes.toString().padStart(2, '0');
const sStr = seconds.toString().padStart(2, '0');

if(document.getElementById("totalDays")) document.getElementById("totalDays").innerText = absoluteDays.toLocaleString();
if(document.getElementById("totalHours")) document.getElementById("totalHours").innerText = absoluteHours.toLocaleString();
if(document.getElementById("totalMinutes")) document.getElementById("totalMinutes").innerText = absoluteMinutes.toLocaleString();
if(document.getElementById("totalSeconds")) document.getElementById("totalSeconds").innerText = absoluteSeconds.toLocaleString();

if(document.getElementById("counter")) document.getElementById("counter").innerHTML = `${dStr} : ${hStr} : ${mStr} : ${sStr}`;
}

setInterval(updateTimer, 1000);
updateTimer();
</script>
